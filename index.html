<!DOCTYPE html>
<html>
	<head>
	</head>
	<body>
		<h1>Messenger App</h1>
		<div id="messages"></div>
		<input id="textMsg">
		<button id="enter">Enter</button>
		<script>
			const socket = new WebSocket("wss://jmessage-a4q3.onrender.com/ws");
			
			function displayMessage(user, text) {
				const allMessages = document.getElementById("messages");
				allMessages.innerHTML += `<p><b>${user}:</b> ${text}</p>`;
			}
			
			function sendMessage() {
				const messageText = document.getElementById("textMsg").value;
				const msg = { user: "User", content: messageText };
				socket.send(JSON.stringify(msg));
			}
			
			socket.onopen = () => {
				console.log("Connected to a Python Server!");
				//const msg = { user: "MyUser", content: "Hello from GitHubPages!" };
				//socket.send(JSON.stringify(msg));
			};
			
			socket.onmessage = (event) => {
				try {
					const response = JSON.parse(event.data)
					if (response.type === "history") {
						console.log(response.data[0]);
						response.data.forEach(msg => displayMessage(msg.sender, msg.text));
					} else if (response.type === "new_message") {
						displayMessage(response.user, response.content);
					}
				} catch (e) {
					console.log("Message from server:", event.data);
				}
			};
			
			socket.onclose = () => {
				console.log("Disconnected. Attempting to reconnect...");
			};
			
			document.getElementById("enter").addEventListener("click", sendMessage);
		</script>
	</body>
</html>
